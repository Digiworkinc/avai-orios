<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00f2ff" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/images/app-icon-192.svg" />
    <title>AVAI-ORIOS | Smart Technology System Integrator</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Extract base path from current URL
          const currentPath = window.location.pathname;
          let basePath = '/';
          
          // If path contains /avai-orios/, use that as base
          if (currentPath.includes('/avai-orios/')) {
            basePath = '/avai-orios/';
          }
          
          navigator.serviceWorker.register(basePath + 'sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW registration failed', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
